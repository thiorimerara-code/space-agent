provider:
  api_base: https://openrouter.ai/api/v1/chat/completions
  model: openai/gpt-5.4-mini
  api_key_env: OPENROUTER_API_KEY
  temperature: 0.2
  max_tokens: 4000
  timeout_ms: 90000
  retry_count: 2
  retry_backoff_ms: 1500
  referer: https://space-agent.local/tests/agent_llm_turn_flags
  title: "Space Agent Turn Flag Prompt Tests"

paths:
  prompts_dir: ./prompts
  cases_dir: ./cases
  histories_dir: ./histories
  results_dir: ./results
  leaderboard_file: ./results/leaderboard.yaml
  latest_run_file: ./results/latest-run.json

run:
  case_concurrency: all
  active_prompts:
    - 018_literal_marker_examples
    - 017_marker_state_hardline
    - 002_autonomy_hardline
    - 007_resolved_blocker_executes
    - 008_switch_source_class
    - 009_single_block_turn_end
    - 011_use_transient_target_directly
    - 012_open_goal_momentum
    - 014_state_guardrails
  active_cases:
    - page_title_requires_execution
    - smalltalk_hi_terminal
    - time_requires_execution
    - weather_omitted_scope
    - weather_self_scope_followup
    - weather_self_scope_after_indirect_fail
    - finish_weather_after_geolocation
    - weather_after_place_prerequisite
    - terminal_after_weather_ready
    - reverse_geocode_after_precise_followup
    - unpack_collapsed_weather_payload
    - create_note_after_user_detail_read
    - write_user_yaml_after_read
    - recover_known_file_after_write_error
    - continue_after_widget_load_success
    - continue_after_widget_read
    - no_false_success_after_error
    - direct_repair_after_known_widget_error
