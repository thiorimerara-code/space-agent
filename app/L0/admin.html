<!DOCTYPE html>
<html lang="en" data-layout="horizontal">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent One Admin</title>
    <style>
      :root {
        --page-bg: #e8edf5;
        --pane-bg: #ffffff;
        --admin-bg: #f5f7fb;
        --pane-border: rgba(24, 33, 44, 0.12);
        --shadow: 0 18px 48px rgba(24, 33, 44, 0.08);
        --divider-size: 12px;
        --divider-hit-size: 24px;
        --divider-color: rgba(24, 33, 44, 0.12);
        --split-size: 360px;
        --font-stack: "SF Pro Text", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        background: radial-gradient(circle at top, #f8fafc, var(--page-bg) 58%);
        color: #18212c;
        font-family: var(--font-stack);
      }

      html[data-layout="horizontal"] body[data-dragging="true"] {
        cursor: col-resize;
        user-select: none;
      }

      html[data-layout="vertical"] body[data-dragging="true"] {
        cursor: row-resize;
        user-select: none;
      }

      .admin-shell {
        display: flex;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      html[data-layout="horizontal"] .admin-shell {
        flex-direction: row;
      }

      html[data-layout="vertical"] .admin-shell {
        flex-direction: column;
      }

      .pane {
        min-width: 0;
        min-height: 0;
        display: flex;
        background: var(--pane-bg);
      }

      .admin-pane {
        flex: 0 0 var(--split-size);
        background: var(--admin-bg);
      }

      .main-pane {
        flex: 1 1 auto;
        box-shadow: var(--shadow);
      }

      .pane iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #ffffff;
      }

      .divider {
        position: relative;
        z-index: 1;
        flex: 0 0 var(--divider-size);
        background: transparent;
      }

      .divider::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        width: 1px;
        transform: translateX(-50%);
        background: var(--divider-color);
      }

      .divider-handle {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        display: block;
        width: var(--divider-hit-size);
        height: 100%;
        margin: 0;
        padding: 0;
        border: 0;
        background: transparent;
        transform: translateX(-50%);
        cursor: col-resize;
        touch-action: none;
      }

      html[data-layout="vertical"] .divider::before {
        top: 50%;
        right: 0;
        bottom: auto;
        left: 0;
        width: auto;
        height: 1px;
        transform: translateY(-50%);
      }

      html[data-layout="vertical"] .divider-handle {
        top: 50%;
        right: 0;
        bottom: auto;
        left: 0;
        width: 100%;
        height: var(--divider-hit-size);
        transform: translateY(-50%);
        cursor: row-resize;
      }
    </style>
  </head>
  <body>
    <div class="admin-shell">
      <aside class="pane admin-pane" aria-label="Admin panel">
        <iframe
          id="admin-frame"
          title="Agent One admin panel"
          src="/admin-panel.html"
          sandbox="allow-scripts allow-same-origin"
        ></iframe>
      </aside>
      <div class="divider">
        <button
          id="divider-handle"
          class="divider-handle"
          type="button"
          aria-label="Resize split view"
          title="Drag to resize panels"
        ></button>
      </div>
      <section class="pane main-pane" aria-label="Main application">
        <iframe id="main-frame" title="Agent One main app" src="/index.html"></iframe>
      </section>
    </div>

    <script>
      const body = document.body;
      const adminFrame = document.getElementById("admin-frame");
      const mainFrame = document.getElementById("main-frame");
      const dividerHandle = document.getElementById("divider-handle");
      const portraitQuery = window.matchMedia("(orientation: portrait)");
      const splitRatios = {
        horizontal: 0.34,
        vertical: 0.32
      };
      const dragState = {
        active: false,
        pointerId: null
      };

      function getLayout() {
        return portraitQuery.matches ? "vertical" : "horizontal";
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function getAxisSize() {
        return getLayout() === "horizontal" ? window.innerWidth : window.innerHeight;
      }

      function getMinPaneSize() {
        return getLayout() === "horizontal" ? 280 : 220;
      }

      function getMaxSplitSize() {
        const axisSize = getAxisSize();
        const minPaneSize = getMinPaneSize();
        return Math.max(minPaneSize, axisSize - minPaneSize - 12);
      }

      function applySplitSize(size) {
        const minPaneSize = getMinPaneSize();
        const maxSplitSize = getMaxSplitSize();
        const nextSize = clamp(size, minPaneSize, maxSplitSize);
        const axisSize = getAxisSize();
        const layout = getLayout();

        document.documentElement.style.setProperty("--split-size", `${nextSize}px`);
        splitRatios[layout] = nextSize / axisSize;
      }

      function syncLayout() {
        const layout = getLayout();
        const axisSize = getAxisSize();
        document.documentElement.dataset.layout = layout;
        applySplitSize(axisSize * splitRatios[layout]);
      }

      function reloadMainIndex() {
        try {
          if (mainFrame.contentWindow) {
            mainFrame.contentWindow.location.replace("/index.html");
            return;
          }
        } catch (_error) {
          // Fall back to resetting the iframe source if direct access is unavailable.
        }

        mainFrame.src = "/index.html";
      }

      function updateFromPointer(clientX, clientY) {
        const nextSize = getLayout() === "horizontal" ? clientX : clientY;
        applySplitSize(nextSize);
      }

      function stopDragging() {
        dragState.active = false;
        dragState.pointerId = null;
        body.dataset.dragging = "false";
      }

      dividerHandle.addEventListener("pointerdown", (event) => {
        dragState.active = true;
        dragState.pointerId = event.pointerId;
        body.dataset.dragging = "true";
        dividerHandle.setPointerCapture(event.pointerId);
        updateFromPointer(event.clientX, event.clientY);
        event.preventDefault();
      });

      dividerHandle.addEventListener("pointermove", (event) => {
        if (!dragState.active || event.pointerId !== dragState.pointerId) {
          return;
        }

        updateFromPointer(event.clientX, event.clientY);
      });

      dividerHandle.addEventListener("pointerup", (event) => {
        if (event.pointerId !== dragState.pointerId) {
          return;
        }

        stopDragging();
      });

      dividerHandle.addEventListener("pointercancel", stopDragging);
      dividerHandle.addEventListener("lostpointercapture", stopDragging);

      dividerHandle.addEventListener("keydown", (event) => {
        const step = event.shiftKey ? 48 : 24;
        const layout = getLayout();
        const decrementKeys = layout === "horizontal" ? ["ArrowLeft"] : ["ArrowUp"];
        const incrementKeys = layout === "horizontal" ? ["ArrowRight"] : ["ArrowDown"];
        const currentSize = Number.parseFloat(
          getComputedStyle(document.documentElement).getPropertyValue("--split-size")
        );

        if (decrementKeys.includes(event.key)) {
          applySplitSize(currentSize - step);
          event.preventDefault();
          return;
        }

        if (incrementKeys.includes(event.key)) {
          applySplitSize(currentSize + step);
          event.preventDefault();
        }
      });

      window.addEventListener("message", (event) => {
        if (event.source !== adminFrame.contentWindow) {
          return;
        }

        if (!event.data || event.data.type !== "agent-one-admin-reload-index") {
          return;
        }

        reloadMainIndex();
      });

      if (portraitQuery.addEventListener) {
        portraitQuery.addEventListener("change", syncLayout);
      } else if (portraitQuery.addListener) {
        portraitQuery.addListener(syncLayout);
      }

      window.addEventListener("resize", syncLayout);
      syncLayout();
    </script>
  </body>
</html>
