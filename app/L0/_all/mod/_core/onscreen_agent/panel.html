<html>
  <head>
    <link rel="stylesheet" href="/mod/_core/visual/index.css" />
    <link rel="stylesheet" href="/mod/_core/onscreen_agent/onscreen-agent.css" />
    <link rel="stylesheet" href="/mod/_core/onscreen_agent/response-markdown.css" />
    <script type="module" src="/mod/_core/onscreen_agent/store.js"></script>
  </head>
  <body>
    <div x-data class="onscreen-agent-root agent-thread-surface" x-init="$nextTick(() => $store.onscreenAgent.init())">
      <template x-if="$store.onscreenAgent && $store.onscreenAgent.shouldRenderShell">
        <section
          class="onscreen-agent-shell"
          :class="{
            'is-compact': $store.onscreenAgent.isCompactMode,
            'is-full': $store.onscreenAgent.isFullMode,
            'is-history-below': $store.onscreenAgent.isHistoryBelow,
            'is-mode-collapsing': $store.onscreenAgent.isModeTransitionCollapsing,
            'is-mode-expanding': $store.onscreenAgent.isModeTransitionExpanding,
            'is-right': $store.onscreenAgent.isDockedRight
          }"
          x-ref="shell"
          x-cloak
          :style="$store.onscreenAgent.positionStyle"
          @dragend.window="$store.onscreenAgent.resetAttachmentDragState()"
          @drop.window="$store.onscreenAgent.resetAttachmentDragState()"
          x-init="$nextTick(() => $store.onscreenAgent.mount({ actionMenu: $refs.actionMenu, avatar: $refs.avatar, attachmentInput: $refs.attachmentInput, historyDialog: $refs.historyDialog, input: $refs.input, panel: $refs.panel, rawDialog: $refs.rawDialog, scroller: $refs.scroller, settingsDialog: $refs.settingsDialog, shell: $refs.shell, uiBubbleContent: $refs.uiBubbleContent }))"
          x-destroy="$store.onscreenAgent.unmount()"
        >
          <div class="onscreen-agent-cluster">
            <div
              class="onscreen-agent-ui-bubble"
              x-show="$store.onscreenAgent.isUiBubbleMounted"
              :class="{
                'is-left': $store.onscreenAgent.isDockedRight,
                'is-right': !$store.onscreenAgent.isDockedRight,
                'is-above': !$store.onscreenAgent.isUiBubbleBelowHead,
                'is-below': $store.onscreenAgent.isUiBubbleBelowHead,
                'is-entering': $store.onscreenAgent.uiBubblePhase === 'entering',
                'is-visible': $store.onscreenAgent.uiBubblePhase === 'visible',
                'is-leaving': $store.onscreenAgent.uiBubblePhase === 'leaving'
              }"
              role="status"
              aria-live="polite"
              aria-atomic="true"
            >
              <div x-ref="uiBubbleContent"></div>
            </div>
            <button
              type="button"
              class="onscreen-agent-avatar-button"
              x-ref="avatar"
              :aria-label="$store.onscreenAgent.avatarButtonLabel"
              :title="$store.onscreenAgent.avatarButtonLabel"
              @pointerdown="$store.onscreenAgent.handleAgentPointerDown($event)"
            >
              <span class="onscreen-agent-avatar-orbit">
                <span class="onscreen-agent-avatar-flip">
                  <img
                    class="onscreen-agent-avatar-image"
                    src="/mod/_core/onscreen_agent/res/astronaut_no_bg.webp"
                    alt=""
                    aria-hidden="true"
                    draggable="false"
                  />
                </span>
              </span>
            </button>

            <div class="onscreen-agent-body">
              <template x-if="$store.onscreenAgent.isFullMode">
                <div
                  class="onscreen-agent-history-shell"
                  :style="$store.onscreenAgent.historyStyle"
                  x-ref="historyShell"
                  x-show="$store.onscreenAgent.shouldShowHistory"
                  x-init="$nextTick(() => $store.onscreenAgent.mountHistory({ historyShell: $refs.historyShell, scroller: $refs.scroller }))"
                  x-destroy="$store.onscreenAgent.unmountHistory()"
                >
                  <div
                    class="onscreen-agent-history-resize-handle"
                    title="Resize chat history"
                    @pointerdown="$store.onscreenAgent.handleHistoryResizePointerDown($event)"
                  ></div>
                  <div class="onscreen-agent-history" x-ref="scroller" @click="$store.onscreenAgent.handleThreadClick($event)">
                    <div class="chat-thread" x-ignore data-chat-thread></div>
                  </div>
                </div>
              </template>

              <div
                class="onscreen-agent-panel"
                :class="{
                  'is-attachment-drag-active': $store.onscreenAgent.isAttachmentDragActive,
                  'is-compact': $store.onscreenAgent.isCompactMode
                }"
                x-ref="panel"
                @dragenter="$store.onscreenAgent.handleAttachmentDragEnter($event)"
                @dragover="$store.onscreenAgent.handleAttachmentDragOver($event)"
                @dragleave="$store.onscreenAgent.handleAttachmentDragLeave($event)"
                @drop="$store.onscreenAgent.handleAttachmentDrop($event)"
              >
                <form
                  class="onscreen-agent-composer"
                  :class="{ 'is-compact': $store.onscreenAgent.isCompactMode }"
                  @submit.prevent="$store.onscreenAgent.handleComposerSubmitAction()"
                >
                  <input
                    x-ref="attachmentInput"
                    type="file"
                    multiple
                    class="composer-attachment-input"
                    @change="$store.onscreenAgent.handleAttachmentInput($event)"
                  />
                  <div class="onscreen-agent-composer-input-wrap">
                    <textarea
                      x-ref="input"
                      name="message"
                      rows="1"
                      aria-label="Message onscreen agent"
                      :placeholder="$store.onscreenAgent.composerPlaceholder"
                      x-model="$store.onscreenAgent.draft"
                      :disabled="$store.onscreenAgent.isComposerInputDisabled || $store.onscreenAgent.shouldShowApiKeyWarning"
                      @input="$store.onscreenAgent.handleDraftInput($event)"
                      @keydown="$store.onscreenAgent.handleComposerKeydown($event)"
                    ></textarea>
                    <template x-if="$store.onscreenAgent.shouldShowApiKeyWarning">
                      <div class="onscreen-agent-set-api-key-overlay">
                        <button
                          type="button"
                          class="onscreen-agent-set-api-key-button"
                          @click="$store.onscreenAgent.openSettingsDialog()"
                        >
                          Set API key
                        </button>
                      </div>
                    </template>
                  </div>
                  <div class="onscreen-agent-composer-actions">
                    <button
                      type="button"
                      class="onscreen-agent-inline-button onscreen-agent-send-button"
                      :class="{
                        'is-busy': $store.onscreenAgent.isPrimaryActionBusy,
                        'is-stop': $store.onscreenAgent.isPrimaryActionStop
                      }"
                      :disabled="$store.onscreenAgent.isPrimaryActionDisabled"
                      :aria-label="$store.onscreenAgent.primaryActionLabel"
                      :title="$store.onscreenAgent.primaryActionLabel"
                      @click="$store.onscreenAgent.handleComposerPrimaryAction()"
                    >
                      <x-icon x-text="$store.onscreenAgent.primaryActionIcon"></x-icon>
                    </button>
                    <button
                      x-show="$store.onscreenAgent.isFullMode"
                      type="button"
                      class="onscreen-agent-inline-button onscreen-agent-attach-button"
                      :disabled="$store.onscreenAgent.isAttachmentPickerDisabled"
                      @click="$store.onscreenAgent.openAttachmentPicker()"
                      aria-label="Attach files"
                      title="Attach files"
                    >
                      <x-icon>attach_file</x-icon>
                    </button>
                    <button
                      x-show="$store.onscreenAgent.isCompactMode"
                      type="button"
                      class="onscreen-agent-inline-button onscreen-agent-menu-button"
                      :aria-expanded="String($store.onscreenAgent.isComposerActionMenuOpen)"
                      aria-controls="onscreen-agent-composer-menu"
                      aria-haspopup="menu"
                      @click="$store.onscreenAgent.toggleComposerActionMenu($event)"
                      aria-label="Open chat actions"
                      title="Open chat actions"
                    >
                      <x-icon>more_horiz</x-icon>
                    </button>
                  </div>
                </form>

                <template x-if="$store.onscreenAgent.draftAttachments.length">
                  <div class="composer-attachments" aria-label="Selected attachments">
                    <template x-for="attachment in $store.onscreenAgent.draftAttachments" :key="attachment.id">
                      <button
                        type="button"
                        class="composer-attachment"
                        @click="$store.onscreenAgent.removeDraftAttachment(attachment.id)"
                        :title="`Remove ${attachment.name}`"
                      >
                        <span class="composer-attachment-name" x-text="attachment.name"></span>
                        <x-icon>close</x-icon>
                      </button>
                    </template>
                  </div>
                </template>

                <div
                  class="onscreen-agent-footer"
                  x-show="$store.onscreenAgent.isFullMode"
                >
                  <button
                    type="button"
                    class="onscreen-agent-footer-icon"
                    @click="$store.onscreenAgent.showCompactMode()"
                    aria-label="Switch to compact chat mode"
                    title="Switch to compact chat mode"
                  >
                    <x-icon>close_fullscreen</x-icon>
                  </button>
                  <button
                    type="button"
                    class="chat-option onscreen-agent-llm-button"
                    @click="$store.onscreenAgent.openSettingsDialog()"
                    aria-label="Open chat settings"
                    title="Open chat settings"
                  >
                    <span class="chat-option-value" x-text="$store.onscreenAgent.llmSummary"></span>
                  </button>
                  <div class="onscreen-agent-footer-meta">
                    <span class="onscreen-agent-token-count" x-text="$store.onscreenAgent.historyTokenSummary"></span>
                    <button
                      type="button"
                      class="onscreen-agent-footer-icon"
                      :class="{ 'is-active': $store.onscreenAgent.isCompactingHistory }"
                      :disabled="$store.onscreenAgent.isCompactDisabled"
                      @click="$store.onscreenAgent.handleCompactClick()"
                      aria-label="Compact context window"
                      title="Compact context window"
                    >
                      <x-icon x-text="$store.onscreenAgent.compactButtonIcon"></x-icon>
                    </button>
                    <button
                      type="button"
                      class="onscreen-agent-footer-icon"
                      @click="$store.onscreenAgent.openPromptHistoryDialog()"
                      aria-label="Show context window"
                      title="Show context window"
                    >
                      <x-icon>notes</x-icon>
                    </button>
                    <button
                      type="button"
                      class="onscreen-agent-footer-icon danger"
                      :disabled="$store.onscreenAgent.isClearDisabled"
                      @click="$store.onscreenAgent.handleClearClick()"
                      aria-label="Reset chat"
                      title="Reset chat"
                    >
                      <x-icon>restart_alt</x-icon>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <template x-teleport="body">
            <div class="space-popover-layer onscreen-agent-popover-layer" x-show="$store.onscreenAgent.isComposerActionMenuOpen" x-cloak>
              <div
                id="onscreen-agent-composer-menu"
                class="space-popover-panel onscreen-agent-action-menu"
                x-ref="actionMenu"
                x-show="$store.onscreenAgent.isComposerActionMenuOpen"
                :style="$store.onscreenAgent.composerActionMenuStyle"
                @click.outside="$store.onscreenAgent.closeComposerActionMenu()"
                @keydown.escape.window="$store.onscreenAgent.closeComposerActionMenu()"
              >
                <template x-for="action in $store.onscreenAgent.composerActionMenuActions" :key="action.id">
                  <button
                    type="button"
                    class="space-popover-action"
                    :class="{ 'is-danger': action.danger }"
                    :disabled="Boolean(action.disabled)"
                    @click="$store.onscreenAgent.submitComposerActionMenuAction(action.id)"
                  >
                    <x-icon x-text="action.icon"></x-icon>
                    <span class="space-popover-action-label" x-text="action.label"></span>
                  </button>
                </template>
              </div>
            </div>
          </template>

          <template x-teleport="body">
            <div class="space-dialog-layer">
              <dialog
                id="onscreen-agent-settings-dialog"
                class="chat-dialog"
                x-ref="settingsDialog"
                @cancel.prevent="$store.onscreenAgent.closeSettingsDialog()"
              >
                <form method="dialog" class="dialog-card dialog-card-shell" @submit.prevent="$store.onscreenAgent.saveSettingsFromDialog()">
                  <header class="dialog-header">
                    <div>
                      <p class="page-eyebrow">Settings</p>
                      <h2>Model, credentials, params, and instructions</h2>
                    </div>
                  </header>
                  <div class="dialog-scroll-body">
                    <label class="field">
                      <span>Provider API Endpoint URL</span>
                      <input type="url" x-model="$store.onscreenAgent.settingsDraft.apiEndpoint" />
                    </label>
                    <label class="field">
                      <span>Model Name</span>
                      <input type="text" x-model="$store.onscreenAgent.settingsDraft.model" />
                    </label>
                    <label class="field">
                      <span>Max Tokens</span>
                      <input type="number" min="1" step="1" inputmode="numeric" x-model="$store.onscreenAgent.settingsDraft.maxTokens" />
                      <p class="field-note">
                        Default <code>64000</code>. When prompt history exceeds this, compaction runs automatically before the next send.
                      </p>
                    </label>
                    <label class="field">
                      <span>API Key</span>
                      <input type="password" x-model="$store.onscreenAgent.settingsDraft.apiKey" />
                    </label>
                    <label class="field">
                      <span>Params</span>
                      <textarea
                        rows="6"
                        spellcheck="false"
                        placeholder="temperature:0.2"
                        x-model="$store.onscreenAgent.settingsDraft.paramsText"
                      ></textarea>
                      <p class="field-note">
                        YAML format. Example: <code>temperature:0.2</code>
                      </p>
                    </label>
                    <label class="field">
                      <span>Custom Instructions</span>
                      <textarea
                        rows="8"
                        x-model="$store.onscreenAgent.systemPromptDraft"
                      ></textarea>
                      <p class="field-note">
                        Appended after the fixed onscreen agent system prompt. Clear this field to use the default prompt only.
                      </p>
                    </label>
                    <p class="dialog-note">
                      These values and custom instructions are stored in <code>~/conf/onscreen-agent.yaml</code>.
                    </p>
                  </div>
                  <div class="dialog-actions">
                    <button type="button" class="secondary-button" @click="$store.onscreenAgent.resetSettingsDraftToDefaults()">
                      Defaults
                    </button>
                    <button type="button" class="secondary-button" @click="$store.onscreenAgent.closeSettingsDialog()">Cancel</button>
                    <button type="submit" class="confirm-button">Save Settings</button>
                  </div>
                </form>
              </dialog>

              <dialog
                id="onscreen-agent-raw-dialog"
                class="chat-dialog"
                x-ref="rawDialog"
                @cancel.prevent="$store.onscreenAgent.closeRawDialog()"
              >
                <div class="dialog-card dialog-card-raw">
                  <header class="dialog-header">
                    <div>
                      <p class="page-eyebrow">LLM Output</p>
                      <h2 x-text="$store.onscreenAgent.rawOutputTitle"></h2>
                    </div>
                  </header>
                  <div class="raw-output-frame">
                    <pre class="raw-output" x-text="$store.onscreenAgent.rawOutputContent || '[No raw output available]'"></pre>
                  </div>
                  <div class="dialog-actions">
                    <button type="button" class="secondary-button" @click="$store.onscreenAgent.closeRawDialog()">Close</button>
                  </div>
                </div>
              </dialog>

              <dialog
                id="onscreen-agent-history-dialog"
                class="chat-dialog"
                x-ref="historyDialog"
                @cancel.prevent="$store.onscreenAgent.closePromptHistoryDialog()"
              >
                <div class="dialog-card dialog-card-raw dialog-card-shell">
                  <header class="dialog-header">
                    <div>
                      <p class="page-eyebrow">Context Window</p>
                      <h2 x-text="$store.onscreenAgent.promptHistoryTitle"></h2>
                    </div>
                    <div class="dialog-header-actions">
                      <div class="dialog-segmented-control" role="tablist" aria-label="Prompt history mode">
                        <button
                          type="button"
                          class="secondary-button dialog-segmented-button"
                          :class="{ 'is-active': $store.onscreenAgent.promptHistoryMode === 'text' }"
                          @click="$store.onscreenAgent.setPromptHistoryMode('text')"
                        >
                          <x-icon>notes</x-icon>
                          <span>Text</span>
                        </button>
                        <button
                          type="button"
                          class="secondary-button dialog-segmented-button"
                          :class="{ 'is-active': $store.onscreenAgent.promptHistoryMode === 'json' }"
                          @click="$store.onscreenAgent.setPromptHistoryMode('json')"
                        >
                          <x-icon>data_object</x-icon>
                          <span>JSON</span>
                        </button>
                      </div>
                    </div>
                  </header>
                  <div class="raw-output-frame dialog-scroll-frame" data-prompt-history-frame>
                    <template x-if="$store.onscreenAgent.promptHistoryMode === 'text'">
                      <div class="prompt-history-list">
                        <template x-if="!$store.onscreenAgent.promptHistorySections.length">
                          <pre class="raw-output"></pre>
                        </template>
                        <template x-for="(section, index) in $store.onscreenAgent.promptHistorySections" :key="`${section.role}-${index}`">
                          <section
                            class="prompt-history-section"
                            :class="{ 'is-target': section.isTarget }"
                            :data-prompt-history-message-index="section.messageIndex"
                          >
                            <div class="prompt-history-role" x-text="`${section.role} (${section.tokenCountLabel}):`"></div>
                            <pre class="prompt-history-body" x-text="section.content"></pre>
                          </section>
                        </template>
                      </div>
                    </template>
                    <template x-if="$store.onscreenAgent.promptHistoryMode === 'json'">
                      <pre
                        class="raw-output"
                        data-prompt-history-json-output
                        x-text="$store.onscreenAgent.promptHistoryContent || '[]'"
                      ></pre>
                    </template>
                  </div>
                  <div class="dialog-actions dialog-actions-split prompt-history-actions">
                    <div class="dialog-actions-group prompt-history-actions-left">
                      <button
                        type="button"
                        class="secondary-button dialog-action-button-fixed prompt-history-action-button"
                        title="Jump to first real user message"
                        aria-label="Jump to first real user message"
                        :disabled="!$store.onscreenAgent.hasPromptHistoryUserMessages"
                        @click="$store.onscreenAgent.jumpToFirstPromptHistoryUserMessage()"
                      >
                        <x-icon>person</x-icon>
                        <span>1st</span>
                      </button>
                      <button
                        type="button"
                        class="secondary-button dialog-action-button-fixed prompt-history-action-button"
                        title="Jump to previous real user message"
                        aria-label="Jump to previous real user message"
                        :disabled="!$store.onscreenAgent.canJumpToPreviousPromptHistoryUserMessage"
                        @click="$store.onscreenAgent.jumpToPreviousPromptHistoryUserMessage()"
                      >
                        <x-icon>keyboard_arrow_up</x-icon>
                      </button>
                      <button
                        type="button"
                        class="secondary-button dialog-action-button-fixed prompt-history-action-button"
                        title="Jump to next real user message"
                        aria-label="Jump to next real user message"
                        :disabled="!$store.onscreenAgent.canJumpToNextPromptHistoryUserMessage"
                        @click="$store.onscreenAgent.jumpToNextPromptHistoryUserMessage()"
                      >
                        <x-icon>keyboard_arrow_down</x-icon>
                      </button>
                    </div>
                    <div class="dialog-actions-group dialog-actions-group-end prompt-history-actions-right">
                      <button
                        type="button"
                        class="secondary-button dialog-action-button-fixed prompt-history-action-button"
                        title="Copy system prompt"
                        aria-label="Copy system prompt"
                        @click="$store.onscreenAgent.copyPromptHistorySystemPrompt()"
                      >
                        <x-icon>content_copy</x-icon>
                        <span>System</span>
                      </button>
                      <button
                        type="button"
                        class="secondary-button dialog-action-button-fixed prompt-history-action-button"
                        title="Copy history"
                        aria-label="Copy history"
                        @click="$store.onscreenAgent.copyPromptHistoryHistory()"
                      >
                        <x-icon>content_copy</x-icon>
                        <span>History</span>
                      </button>
                      <button
                        type="button"
                        class="secondary-button dialog-action-button-fixed prompt-history-action-button"
                        title="Copy all"
                        aria-label="Copy all"
                        @click="$store.onscreenAgent.copyPromptHistoryAll()"
                      >
                        <x-icon>content_copy</x-icon>
                        <span>All</span>
                      </button>
                      <button
                        type="button"
                        class="secondary-button dialog-action-button-fixed prompt-history-action-button"
                        @click="$store.onscreenAgent.closePromptHistoryDialog()"
                      >
                        <span>Close</span>
                      </button>
                    </div>
                  </div>
                </div>
              </dialog>
            </div>
          </template>
        </section>
      </template>
    </div>
  </body>
</html>
