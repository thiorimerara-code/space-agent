<html>
  <head>
    <link rel="stylesheet" href="/mod/_core/admin/views/agent/agent.css" />
    <script type="module" src="/mod/_core/admin/views/agent/store.js"></script>
  </head>
  <body>
    <div x-data class="admin-agent-root">
      <template x-if="$store.adminAgent">
        <section
          class="admin-agent-surface"
          x-cloak
          x-init="$nextTick(() => $store.adminAgent.mount({ historyDialog: $refs.historyDialog, input: $refs.input, rawDialog: $refs.rawDialog, scroller: $refs.scroller, settingsDialog: $refs.settingsDialog, systemDialog: $refs.systemDialog, thread: $refs.thread }))"
          x-destroy="$store.adminAgent.unmount()"
        >
          <header class="admin-agent-toolbar">
            <section class="admin-agent-meta" aria-label="Admin agent options">
              <button type="button" class="chat-option chat-option-llm" @click="$store.adminAgent.openSettingsDialog()">
                <span class="chat-option-label">LLM</span>
                <span class="chat-option-value" x-text="$store.adminAgent.llmSummary"></span>
                <x-icon>edit</x-icon>
              </button>
              <button type="button" class="chat-option chat-option-prompt" @click="$store.adminAgent.openSystemDialog()">
                <span class="chat-option-label">Instructions</span>
                <span class="chat-option-value" x-text="$store.adminAgent.promptSummary"></span>
                <x-icon>edit</x-icon>
              </button>
            </section>
          </header>

          <section class="admin-agent-thread-wrap" x-ref="scroller">
            <div class="chat-thread" x-ref="thread" data-chat-thread @click="$store.adminAgent.handleThreadClick($event)"></div>
          </section>

          <footer class="admin-agent-composer-wrap">
            <div class="admin-agent-history-tools">
              <span class="admin-agent-history-token-count" aria-live="polite" x-text="$store.adminAgent.historyTokenSummary"></span>
              <button
                type="button"
                class="admin-agent-compact-button"
                :class="{ 'is-active': $store.adminAgent.isCompactingHistory }"
                :disabled="$store.adminAgent.isCompactDisabled"
                @click="$store.adminAgent.handleCompactClick()"
                aria-label="Compact history"
                title="Compact history"
              >
                <x-icon x-text="$store.adminAgent.compactButtonIcon"></x-icon>
              </button>
              <div class="admin-agent-history-actions">
                <button
                  type="button"
                  class="secondary-button admin-agent-history-action chat-history-button"
                  @click="$store.adminAgent.openPromptHistoryDialog()"
                >
                  History
                </button>
                <button
                  type="button"
                  class="secondary-button danger admin-agent-history-action chat-clear-button"
                  @click="$store.adminAgent.handleClearClick()"
                >
                  Clear
                </button>
              </div>
            </div>
            <form class="chat-composer" @submit.prevent="$store.adminAgent.submitMessage()">
              <textarea
                x-ref="input"
                x-create="$nextTick(() => $el.focus({ preventScroll: true }))"
                name="message"
                rows="1"
                aria-label="Message Admin agent"
                :placeholder="$store.adminAgent.composerPlaceholder"
                x-model="$store.adminAgent.draft"
                :disabled="$store.adminAgent.isComposerInputDisabled"
                @input="$store.adminAgent.handleDraftInput($event)"
                @keydown="$store.adminAgent.handleComposerKeydown($event)"
              ></textarea>
              <div class="chat-composer-actions">
                <span class="composer-hint">Enter to send, Shift+Enter for newline</span>
                <button
                  type="submit"
                  class="primary-button"
                  :disabled="$store.adminAgent.isComposerSubmitDisabled"
                >
                  Send
                </button>
              </div>
            </form>
          </footer>

          <dialog class="chat-dialog" x-ref="systemDialog" @cancel.prevent="$store.adminAgent.closeSystemDialog()">
            <form method="dialog" class="dialog-card" @submit.prevent="$store.adminAgent.saveSystemPromptFromDialog()">
              <header class="dialog-header">
                <div>
                  <p class="page-eyebrow">Custom Instructions</p>
                  <h2>Custom system instructions</h2>
                </div>
              </header>
              <label class="field">
                <span>Instructions</span>
                <textarea rows="12" x-model="$store.adminAgent.systemPromptDraft"></textarea>
                <p class="field-note">
                  These instructions are appended after the fixed admin system prompt.
                </p>
              </label>
              <div class="dialog-actions">
                <button
                  type="button"
                  class="secondary-button"
                  @click="$store.adminAgent.clearSystemPromptDraft()"
                >
                  Clear
                </button>
                <button type="button" class="secondary-button" @click="$store.adminAgent.closeSystemDialog()">Cancel</button>
                <button type="submit" class="primary-button">Save Instructions</button>
              </div>
            </form>
          </dialog>

          <dialog class="chat-dialog" x-ref="settingsDialog" @cancel.prevent="$store.adminAgent.closeSettingsDialog()">
            <form method="dialog" class="dialog-card" @submit.prevent="$store.adminAgent.saveSettingsFromDialog()">
              <header class="dialog-header">
                <div>
                  <p class="page-eyebrow">LLM</p>
                  <h2>Provider, model, credentials, and params</h2>
                </div>
              </header>
              <label class="field">
                <span>Provider API Endpoint URL</span>
                <input type="url" x-model="$store.adminAgent.settingsDraft.apiEndpoint" />
              </label>
              <label class="field">
                <span>Model Name</span>
                <input type="text" x-model="$store.adminAgent.settingsDraft.model" />
              </label>
              <label class="field">
                <span>Max Tokens</span>
                <input type="number" min="1" step="1" inputmode="numeric" x-model="$store.adminAgent.settingsDraft.maxTokens" />
                <p class="field-note">
                  Default <code>64000</code>. When prompt history exceeds this, compaction runs automatically before the next send.
                </p>
              </label>
              <label class="field">
                <span>API Key</span>
                <input type="password" x-model="$store.adminAgent.settingsDraft.apiKey" />
              </label>
              <label class="field">
                <span>Params</span>
                <textarea
                  rows="6"
                  spellcheck="false"
                  placeholder="temperature:0.2"
                  x-model="$store.adminAgent.settingsDraft.paramsText"
                ></textarea>
                <p class="field-note">
                  YAML format. Example: <code>temperature:0.2</code>
                </p>
              </label>
              <p class="dialog-note">
                These values are stored in <code>~/conf/admin-chat.yaml</code>.
              </p>
              <div class="dialog-actions">
                <button type="button" class="secondary-button" @click="$store.adminAgent.resetSettingsDraftToDefaults()">
                  Defaults
                </button>
                <button type="button" class="secondary-button" @click="$store.adminAgent.closeSettingsDialog()">Cancel</button>
                <button type="submit" class="primary-button">Save Settings</button>
              </div>
            </form>
          </dialog>

          <dialog class="chat-dialog" x-ref="rawDialog" @cancel.prevent="$store.adminAgent.closeRawDialog()">
            <div class="dialog-card dialog-card-raw">
              <header class="dialog-header">
                <div>
                  <p class="page-eyebrow">LLM Output</p>
                  <h2 x-text="$store.adminAgent.rawOutputTitle"></h2>
                </div>
              </header>
              <div class="raw-output-frame">
                <pre class="raw-output" x-text="$store.adminAgent.rawOutputContent || '[No raw output available]'"></pre>
              </div>
              <div class="dialog-actions">
                <button type="button" class="secondary-button" @click="$store.adminAgent.closeRawDialog()">Close</button>
              </div>
            </div>
          </dialog>

          <dialog class="chat-dialog" x-ref="historyDialog" @cancel.prevent="$store.adminAgent.closePromptHistoryDialog()">
            <div class="dialog-card dialog-card-raw">
              <header class="dialog-header">
                <div>
                  <p class="page-eyebrow">Prompt History</p>
                  <h2 x-text="$store.adminAgent.promptHistoryTitle"></h2>
                </div>
                <div class="dialog-header-actions">
                  <div class="dialog-segmented-control" role="tablist" aria-label="Prompt history mode">
                    <button
                      type="button"
                      class="secondary-button dialog-segmented-button"
                      :class="{ 'is-active': $store.adminAgent.promptHistoryMode === 'text' }"
                      @click="$store.adminAgent.setPromptHistoryMode('text')"
                    >
                      <x-icon>notes</x-icon>
                      <span>Text</span>
                    </button>
                    <button
                      type="button"
                      class="secondary-button dialog-segmented-button"
                      :class="{ 'is-active': $store.adminAgent.promptHistoryMode === 'json' }"
                      @click="$store.adminAgent.setPromptHistoryMode('json')"
                    >
                      <x-icon>data_object</x-icon>
                      <span>JSON</span>
                    </button>
                  </div>
                </div>
              </header>
              <div class="raw-output-frame">
                <template x-if="$store.adminAgent.promptHistoryMode === 'text'">
                  <div class="prompt-history-list">
                    <template x-if="!$store.adminAgent.promptHistorySections.length">
                      <pre class="raw-output"></pre>
                    </template>
                    <template x-for="(section, index) in $store.adminAgent.promptHistorySections" :key="`${section.role}-${index}`">
                      <section class="prompt-history-section">
                        <div class="prompt-history-role" x-text="`${section.role} (${section.tokenCountLabel}):`"></div>
                        <pre class="prompt-history-body" x-text="section.content"></pre>
                      </section>
                    </template>
                  </div>
                </template>
                <template x-if="$store.adminAgent.promptHistoryMode === 'json'">
                  <pre class="raw-output" x-text="$store.adminAgent.promptHistoryContent || '[]'"></pre>
                </template>
              </div>
              <div class="dialog-actions prompt-history-dialog-actions">
                <button
                  type="button"
                  class="secondary-button dialog-icon-button"
                  title="Copy prompt history"
                  aria-label="Copy prompt history"
                  @click="$store.adminAgent.copyPromptHistory()"
                >
                  <x-icon>content_copy</x-icon>
                </button>
                <button type="button" class="secondary-button" @click="$store.adminAgent.closePromptHistoryDialog()">Close</button>
              </div>
            </div>
          </dialog>
        </section>
      </template>
    </div>
  </body>
</html>
