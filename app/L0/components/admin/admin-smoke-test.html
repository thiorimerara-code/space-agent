<div class="admin-card" x-data="{ darkMode: document.body.classList.contains('dark-mode') }">
  <div>
    <h1><x-icon>deployed_code</x-icon> Framework smoke test</h1>
    <p class="admin-muted">
      This root block is loaded through <code>x-component</code> from a standalone HTML file.
    </p>
  </div>

  <section class="admin-card">
    <h2>Nested component</h2>
    <x-component
      path="/components/admin/nested-note.html"
      message="Nested component rendered through another component."
    ></x-component>
  </section>

  <section class="admin-card">
    <h2>HTML extension point</h2>
    <p class="admin-muted">
      The extension point below renders every matching HTML file from
      <code>/extensions/admin-demo/</code>.
    </p>
    <x-extension id="admin-demo"></x-extension>
  </section>

  <section class="admin-card">
    <h2>Actions</h2>
    <p x-text="document.body.dataset.jsExtensionLoaded ? 'JS extension loader is active.' : 'JS extension loader has not run yet.'"></p>
    <div class="admin-actions">
      <button
        class="admin-button"
        type="button"
        @click="
          darkMode = !darkMode;
          document.body.classList.toggle('dark-mode', darkMode);
          document.body.classList.toggle('light-mode', !darkMode);
        "
      >
        <x-icon x-text="darkMode ? 'light_mode' : 'dark_mode'"></x-icon>
        <span x-text="darkMode ? 'Switch to light mode' : 'Switch to dark mode'"></span>
      </button>
      <a class="admin-button" href="/components/admin/framework-modal.html" data-modal-content>
        <x-icon>open_in_new</x-icon>
        Open modal
      </a>
      <button class="admin-button" type="button" data-reload-index>Reload index.html</button>
    </div>
  </section>
</div>
