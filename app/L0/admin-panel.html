<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent One Admin Panel</title>
    <link rel="stylesheet" href="/fw/colors.css" />
    <link rel="stylesheet" href="/fw/index.css" />
    <link rel="stylesheet" href="/fw/modals.css" />
    <link rel="stylesheet" href="/styles/admin-panel.css" />
  </head>
  <body class="light-mode">
    <main class="admin-panel">
      <x-component path="/components/admin/admin-smoke-test.html"></x-component>
    </main>

    <script type="module">
      import "/fw/initFw.js";

      document.addEventListener("click", (event) => {
        const reloadTrigger = event.target.closest("[data-reload-index]");
        if (!reloadTrigger) {
          return;
        }

        event.preventDefault();
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: "agent-one-admin-reload-index" }, "*");
        }
      });
    </script>
  </body>
</html>
