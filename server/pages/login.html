<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Agent Login</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
        --color-canvas: #050816;
        --color-canvas-elevated: #09111f;
        --color-canvas-deep: #02050d;
        --color-surface-1: #0d1628;
        --color-surface-2: #121d33;
        --color-surface-3: #182540;
        --color-surface-glass: rgba(11, 18, 34, 0.78);
        --color-border-soft: rgba(148, 167, 201, 0.16);
        --color-border-strong: rgba(168, 186, 219, 0.28);
        --color-text-primary: #f3f7ff;
        --color-text-secondary: #b8c4da;
        --color-text-tertiary: #8e9bb2;
        --color-accent-primary: #7ddcff;
        --color-accent-primary-strong: #94bcff;
        --color-accent-primary-soft: rgba(125, 220, 255, 0.14);
        --color-accent-secondary: #79edd8;
        --color-accent-ink: #04101d;
        --color-status-success: #7ce4b0;
        --color-status-danger: #ff8d98;
        --color-layer-overlay: rgba(2, 7, 17, 0.68);
        --color-backdrop-glow-primary: rgba(148, 188, 255, 0.18);
        --color-backdrop-glow-secondary: rgba(121, 237, 216, 0.14);
        --color-backdrop-glow-depth: rgba(59, 95, 172, 0.26);
        --color-backdrop-star-strong: rgba(255, 255, 255, 0.76);
        --color-backdrop-star-soft: rgba(255, 255, 255, 0.26);
        --color-backdrop-star-accent: rgba(148, 188, 255, 0.48);
        --color-backdrop-star-halo: rgba(255, 255, 255, 0.12);
        --color-backdrop-star-halo-accent: rgba(148, 188, 255, 0.16);
        --radius-panel: 26px;
        --radius-control: 16px;
        --space-2: 0.5rem;
        --space-3: 0.875rem;
        --space-4: 1.25rem;
        --space-5: 1.75rem;
        --space-6: 2.5rem;
        --shadow-panel: 0 24px 64px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      html {
        min-height: 100%;
      }

      /* Mirrors /mod/_core/framework/css/visual.css for the public login shell. */
      body.space-theme-canvas {
        margin: 0;
        min-height: 100vh;
        display: grid;
        align-items: center;
        padding: clamp(0.875rem, 3vw, 2rem);
        overflow: hidden;
        position: relative;
        background:
          radial-gradient(circle at 50% 45%, rgba(148, 188, 255, 0.14) 0%, transparent 27%),
          radial-gradient(circle at 50% 56%, rgba(121, 237, 216, 0.08) 0%, transparent 18%),
          radial-gradient(circle at 18% 18%, var(--color-backdrop-glow-primary) 0%, transparent 28%),
          radial-gradient(circle at 82% 14%, var(--color-backdrop-glow-secondary) 0%, transparent 23%),
          radial-gradient(circle at 50% 120%, var(--color-backdrop-glow-depth) 0%, transparent 38%),
          linear-gradient(180deg, var(--color-canvas-elevated) 0%, var(--color-canvas) 52%, var(--color-canvas-deep) 100%);
        color: var(--color-text-primary);
      }

      .space-parallax {
        --space-star-speed-multiplier: 2;
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
      }

      .space-parallax-layer,
      .space-shooting-stars {
        position: absolute;
        inset: -24vmax;
        pointer-events: none;
      }

      .space-parallax-layer {
        --space-drift-x: 0px;
        --space-drift-y: 0px;
        --space-duration: 1s;
        --space-rotate: 0deg;
        --space-scale: 1;
        background-repeat: repeat;
        background-position: 0 0;
        transform: translate3d(0, 0, 0) rotate(var(--space-rotate)) scale(var(--space-scale));
        transform-origin: center;
      }

      .space-star-layer {
        backface-visibility: hidden;
        will-change: transform;
        animation:
          space-theme-diagonal-drift
          calc(var(--space-duration) / var(--space-star-speed-multiplier))
          linear
          infinite;
      }

      .space-glow-layer {
        --space-rotate: -6deg;
        --space-scale: 1.08;
        inset: -18vmax;
        opacity: 0.68;
        background:
          radial-gradient(circle at 24% 20%, rgba(148, 188, 255, 0.14) 0%, transparent 28%),
          radial-gradient(circle at 78% 16%, rgba(121, 237, 216, 0.1) 0%, transparent 22%),
          radial-gradient(circle at 50% 108%, rgba(59, 95, 172, 0.16) 0%, transparent 34%);
        background-repeat: no-repeat;
        animation: none;
      }

      .space-star-layer-deep {
        --space-drift-x: 216.3px;
        --space-drift-y: 216.3px;
        --space-duration: 260s;
        --space-rotate: 0deg;
        --space-scale: 1.04;
        opacity: 0.36;
        background-image:
          radial-gradient(circle at 24px 30px, var(--color-backdrop-star-soft) 0 0.55px, transparent 1.18px),
          radial-gradient(circle at 96px 72px, var(--color-backdrop-star-soft) 0 0.46px, transparent 1.1px),
          radial-gradient(circle at 158px 126px, var(--color-backdrop-star-soft) 0 0.52px, transparent 1.16px),
          radial-gradient(circle at 52px 166px, var(--color-backdrop-star-soft) 0 0.5px, transparent 1.12px),
          radial-gradient(circle at 187px 44px, var(--color-backdrop-star-soft) 0 0.48px, transparent 1.08px),
          radial-gradient(circle at 128px 188px, var(--color-backdrop-star-soft) 0 0.44px, transparent 1.04px),
          radial-gradient(circle at 204px 168px, var(--color-backdrop-star-soft) 0 0.5px, transparent 1.12px);
        background-size: 208px 208px;
      }

      .space-star-layer-far {
        --space-drift-x: 244.1px;
        --space-drift-y: 244.1px;
        --space-duration: 170s;
        --space-rotate: 0deg;
        --space-scale: 1.08;
        opacity: 0.56;
        background-image:
          radial-gradient(circle at 28px 22px, var(--color-backdrop-star-soft) 0 0.68px, transparent 1.3px),
          radial-gradient(circle at 92px 84px, var(--color-backdrop-star-strong) 0 0.82px, transparent 1.5px),
          radial-gradient(circle at 146px 44px, var(--color-backdrop-star-soft) 0 0.64px, transparent 1.24px),
          radial-gradient(circle at 188px 134px, var(--color-backdrop-star-soft) 0 0.58px, transparent 1.18px),
          radial-gradient(circle at 64px 168px, var(--color-backdrop-star-accent) 0 0.76px, transparent 1.4px),
          radial-gradient(circle at 206px 198px, var(--color-backdrop-star-soft) 0 0.62px, transparent 1.22px),
          radial-gradient(circle at 118px 206px, var(--color-backdrop-star-soft) 0 0.66px, transparent 1.28px),
          radial-gradient(circle at 222px 84px, var(--color-backdrop-star-strong) 0 0.72px, transparent 1.36px);
        background-size: 226px 226px;
      }

      .space-star-layer-mid {
        --space-drift-x: 264.2px;
        --space-drift-y: 264.2px;
        --space-duration: 118s;
        --space-rotate: 0deg;
        --space-scale: 1.11;
        opacity: 0.62;
        background-image:
          radial-gradient(circle at 26px 24px, var(--color-backdrop-star-soft) 0 0.74px, transparent 1.34px),
          radial-gradient(circle at 74px 102px, var(--color-backdrop-star-strong) 0 0.9px, transparent 1.58px),
          radial-gradient(circle at 126px 48px, var(--color-backdrop-star-soft) 0 0.68px, transparent 1.28px),
          radial-gradient(circle at 182px 138px, var(--color-backdrop-star-accent) 0 0.84px, transparent 1.48px),
          radial-gradient(circle at 56px 184px, var(--color-backdrop-star-soft) 0 0.7px, transparent 1.3px),
          radial-gradient(circle at 154px 198px, var(--color-backdrop-star-strong) 0 0.78px, transparent 1.42px),
          radial-gradient(circle at 214px 76px, var(--color-backdrop-star-soft) 0 0.72px, transparent 1.34px),
          radial-gradient(circle at 228px 210px, var(--color-backdrop-star-soft) 0 0.66px, transparent 1.26px);
        background-size: 238px 238px;
      }

      .space-star-layer-near {
        --space-drift-x: 298.7px;
        --space-drift-y: 298.7px;
        --space-duration: 82s;
        --space-rotate: 0deg;
        --space-scale: 1.14;
        opacity: 0.76;
        background-image:
          radial-gradient(circle at 36px 28px, var(--color-backdrop-star-halo) 0 2.2px, transparent 5.5px),
          radial-gradient(circle at 36px 28px, var(--color-backdrop-star-strong) 0 0.96px, transparent 1.72px),
          radial-gradient(circle at 136px 88px, var(--color-backdrop-star-halo-accent) 0 2.5px, transparent 6px),
          radial-gradient(circle at 136px 88px, var(--color-backdrop-star-accent) 0 1.04px, transparent 1.82px),
          radial-gradient(circle at 84px 182px, var(--color-backdrop-star-halo) 0 2.3px, transparent 5.6px),
          radial-gradient(circle at 84px 182px, var(--color-backdrop-star-strong) 0 0.92px, transparent 1.68px),
          radial-gradient(circle at 196px 148px, var(--color-backdrop-star-strong) 0 0.84px, transparent 1.5px);
        background-size: 262px 262px;
      }

      .space-star-layer-close {
        --space-drift-x: 358.7px;
        --space-drift-y: 358.7px;
        --space-duration: 62s;
        --space-rotate: 0deg;
        --space-scale: 1.18;
        opacity: 0.86;
        background-image:
          radial-gradient(circle at 52px 44px, var(--color-backdrop-star-halo) 0 3px, transparent 7.3px),
          radial-gradient(circle at 52px 44px, var(--color-backdrop-star-strong) 0 1.08px, transparent 1.88px),
          radial-gradient(circle at 186px 164px, var(--color-backdrop-star-halo-accent) 0 3.2px, transparent 7.8px),
          radial-gradient(circle at 186px 164px, var(--color-backdrop-star-accent) 0 1.18px, transparent 2px),
          radial-gradient(circle at 226px 78px, var(--color-backdrop-star-halo) 0 2.8px, transparent 7px),
          radial-gradient(circle at 226px 78px, var(--color-backdrop-star-strong) 0 1.04px, transparent 1.82px),
          radial-gradient(circle at 122px 228px, var(--color-backdrop-star-halo) 0 2.7px, transparent 6.8px),
          radial-gradient(circle at 122px 228px, var(--color-backdrop-star-strong) 0 0.98px, transparent 1.74px);
        background-size: 304px 304px;
      }

      .space-shooting-stars {
        inset: 0;
        overflow: hidden;
      }

      .space-shooting-star {
        --space-shooting-angle: 24deg;
        --space-shooting-distance-x: 36vmax;
        --space-shooting-distance-y: 14vmax;
        --space-shooting-duration: 1200ms;
        --space-shooting-length: 10rem;
        position: absolute;
        top: 20%;
        left: 20%;
        width: var(--space-shooting-length);
        height: 2px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.03) 28%,
          rgba(148, 188, 255, 0.18) 56%,
          rgba(255, 255, 255, 0.96) 100%
        );
        transform-origin: right center;
        filter:
          drop-shadow(0 0 6px rgba(255, 255, 255, 0.5))
          drop-shadow(0 0 18px rgba(148, 188, 255, 0.22));
        opacity: 0;
        will-change: transform, opacity;
      }

      .space-shooting-star.is-active {
        animation: space-theme-shooting-star-flight var(--space-shooting-duration) linear forwards;
      }

      @keyframes space-theme-diagonal-drift {
        from {
          transform: translate3d(0, 0, 0) rotate(var(--space-rotate)) scale(var(--space-scale));
        }

        to {
          transform:
            translate3d(var(--space-drift-x), var(--space-drift-y), 0)
            rotate(var(--space-rotate))
            scale(var(--space-scale));
        }
      }

      @keyframes space-theme-shooting-star-flight {
        0%,
        11% {
          opacity: 0;
          transform: translate3d(0, 0, 0) rotate(var(--space-shooting-angle)) scaleX(0.16);
        }

        18% {
          opacity: 0;
          transform: translate3d(0, 0, 0) rotate(var(--space-shooting-angle)) scaleX(0.24);
        }

        42% {
          opacity: 0.95;
          transform:
            translate3d(
              calc(var(--space-shooting-distance-x) * 0.58),
              calc(var(--space-shooting-distance-y) * 0.58),
              0
            )
            rotate(var(--space-shooting-angle))
            scaleX(1);
        }

        100% {
          opacity: 0;
          transform:
            translate3d(var(--space-shooting-distance-x), var(--space-shooting-distance-y), 0)
            rotate(var(--space-shooting-angle))
            scaleX(0.38);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .space-star-layer {
          animation: none;
          transform: translate3d(0, 0, 0) rotate(var(--space-rotate)) scale(var(--space-scale));
        }

        .space-shooting-star,
        .space-shooting-star.is-active {
          animation: none;
          opacity: 0;
        }
      }

      .shell {
        position: relative;
        z-index: 1;
        width: min(56rem, 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(19.5rem, 24rem);
        gap: clamp(1.5rem, 4vw, 3rem);
        align-items: center;
      }

      .intro {
        position: relative;
        display: grid;
        gap: 0.9rem;
        padding-block: clamp(0.5rem, 2vw, 1.5rem);
      }

      .intro-floating-cluster {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 15.5rem) minmax(6.8rem, 9.8rem);
        gap: clamp(0.3rem, 1.5vw, 0.95rem);
        align-items: center;
        width: fit-content;
        max-width: 100%;
      }

      .intro-title {
        --intro-title-float-x: 0px;
        --intro-title-float-y: 0px;
        --intro-title-rotate: 0deg;
        position: relative;
        z-index: 1;
        min-width: 0;
        transform:
          translate3d(var(--intro-title-float-x), var(--intro-title-float-y), 0)
          rotate(var(--intro-title-rotate));
        transform-origin: 52% 52%;
        will-change: transform;
      }

      .intro-art {
        position: relative;
        min-height: clamp(6.8rem, 15vw, 9.8rem);
        display: grid;
        place-items: center;
      }

      .intro-astronaut {
        --astronaut-float-x: 0px;
        --astronaut-float-y: 0px;
        --astronaut-rotate: 0deg;
        position: relative;
        z-index: 0;
        width: clamp(6.9rem, 15vw, 9.8rem);
        opacity: 0.94;
        pointer-events: none;
        user-select: none;
        transform:
          translate3d(var(--astronaut-float-x), var(--astronaut-float-y), 0)
          rotate(var(--astronaut-rotate));
        transform-origin: 52% 56%;
        filter:
          drop-shadow(0 10px 22px rgba(0, 0, 0, 0.32))
          drop-shadow(0 0 18px rgba(148, 188, 255, 0.14));
        will-change: transform;
      }

      h1 {
        margin: 0;
        max-width: 7ch;
        font-size: clamp(2.7rem, 7vw, 4.6rem);
        line-height: 0.96;
        letter-spacing: -0.05em;
      }

      .intro-copy {
        max-width: 17rem;
        margin: 0;
        color: var(--color-text-secondary);
        font-size: 1rem;
        line-height: 1.5;
      }

      .login-panel {
        position: relative;
        padding: clamp(var(--space-4), 3vw, 1.65rem);
        border-radius: var(--radius-panel);
        background: linear-gradient(180deg, rgba(10, 17, 31, 0.9), rgba(7, 13, 24, 0.82));
        border: 1px solid var(--color-border-soft);
        box-shadow:
          var(--shadow-panel),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(18px);
      }

      h2,
      h3 {
        margin: 0;
        letter-spacing: -0.03em;
      }

      h2 {
        font-size: 1.65rem;
      }

      .panel-copy {
        margin: 0.45rem 0 0;
        color: var(--color-text-secondary);
        line-height: 1.55;
      }

      label {
        display: grid;
        gap: 0.4rem;
        font-size: 0.84rem;
        font-weight: 600;
        color: var(--color-text-primary);
      }

      form {
        display: grid;
        gap: var(--space-3);
        margin-top: 0;
      }

      input {
        width: 100%;
        border: 1px solid var(--color-border-soft);
        border-radius: var(--radius-control);
        padding: 0.86rem 0.95rem;
        font: inherit;
        background: rgba(255, 255, 255, 0.035);
        color: var(--color-text-primary);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        transition:
          border-color 160ms ease,
          background-color 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }

      input::placeholder {
        color: var(--color-text-tertiary);
      }

      input:hover {
        border-color: rgba(168, 186, 219, 0.24);
        background: rgba(255, 255, 255, 0.05);
      }

      input:focus-visible {
        outline: none;
        border-color: rgba(125, 220, 255, 0.5);
        background: rgba(255, 255, 255, 0.06);
        box-shadow:
          0 0 0 4px rgba(125, 220, 255, 0.12),
          0 0 24px rgba(148, 188, 255, 0.12);
      }

      input[readonly] {
        color: var(--color-text-primary);
        cursor: text;
        background: rgba(255, 255, 255, 0.055);
        border-color: rgba(168, 186, 219, 0.24);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 0 0 1px rgba(125, 220, 255, 0.04);
      }

      button {
        border: 0;
        border-radius: var(--radius-control);
        padding: 0.88rem 1rem;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition:
          box-shadow 160ms ease,
          background-color 160ms ease,
          border-color 160ms ease,
          opacity 160ms ease;
      }

      button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 4px rgba(125, 220, 255, 0.12);
      }

      .primary-button {
        width: 100%;
        color: var(--color-accent-ink);
        background: linear-gradient(
          135deg,
          var(--color-accent-primary-strong) 0%,
          var(--color-accent-secondary) 100%
        );
        box-shadow: 0 12px 26px rgba(59, 163, 186, 0.24);
      }

      .primary-button:hover:not(:disabled) {
        box-shadow: 0 16px 30px rgba(59, 163, 186, 0.28);
      }

      button:disabled {
        opacity: 0.68;
        cursor: not-allowed;
      }

      .secondary-button {
        width: 100%;
        color: var(--color-text-primary);
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--color-border-soft);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }

      .secondary-button:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--color-border-strong);
      }

      .secondary-link {
        display: grid;
        place-items: center;
        width: 100%;
        min-height: calc(0.88rem * 2 + 1rem);
        padding: 0.88rem 1rem;
        border-radius: var(--radius-control);
        color: #ffffff;
        font-size: 1rem;
        font-weight: 600;
        line-height: 1.4;
        text-align: center;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(148, 167, 201, 0.12);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        transition:
          box-shadow 160ms ease,
          background-color 160ms ease,
          border-color 160ms ease,
          color 160ms ease,
          opacity 160ms ease;
      }

      .secondary-link:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(168, 186, 219, 0.24);
      }

      .secondary-link:focus-visible {
        outline: none;
        box-shadow: 0 0 0 4px rgba(125, 220, 255, 0.12);
      }

      .login-separator {
        margin: 1.75rem 0 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--color-text-tertiary);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }

      .login-separator::before,
      .login-separator::after {
        content: "";
        flex: 1 1 auto;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(148, 167, 201, 0.22), transparent);
      }

      .field-note {
        margin: 0.45rem 0 0.95rem;
        color: #ffffff;
        font-size: 1rem;
        font-weight: 500;
        line-height: 1.5;
      }

      .field-note-secondary {
        display: block;
        margin-top: 0.4rem;
      }

      .status {
        margin-top: 0;
        font-size: 0.88rem;
        line-height: 1.45;
        overflow-wrap: anywhere;
        color: var(--color-text-secondary);
      }

      .status:not(:empty) {
        margin-top: 0.9rem;
      }

      .status.error {
        color: var(--color-status-danger);
      }

      .status.ok {
        color: var(--color-status-success);
      }

      @media (max-width: 760px) {
        body.space-theme-canvas {
          padding: 0.85rem;
        }

        .shell {
          grid-template-columns: 1fr;
          gap: 1rem;
        }

        .intro {
          max-width: 100%;
          padding-block: 0;
        }

        .intro-floating-cluster {
          grid-template-columns: minmax(0, 12.6rem) clamp(8.1rem, 36vw, 10.2rem);
          gap: 0;
        }

        .intro-art {
          min-height: clamp(8.1rem, 36vw, 10.2rem);
          justify-items: start;
        }

        .intro-astronaut {
          width: clamp(8.1rem, 36vw, 10.2rem);
        }

        h1 {
          max-width: 6.3ch;
          font-size: clamp(2.25rem, 12vw, 3.3rem);
        }

        .intro-copy {
          max-width: 11.6rem;
          font-size: 0.9rem;
          line-height: 1.42;
        }
      }

      @media (max-width: 520px) {
        .intro-floating-cluster {
          grid-template-columns: minmax(0, 10.8rem) clamp(7.35rem, 36vw, 8.85rem);
          gap: 0;
        }

        .intro-art {
          min-height: clamp(7.35rem, 36vw, 8.85rem);
          justify-items: start;
        }

        .intro-astronaut {
          width: clamp(7.35rem, 36vw, 8.85rem);
          opacity: 0.9;
        }

        .login-panel {
          padding: 1rem;
          border-radius: 22px;
        }

        .intro-copy,
        .panel-copy,
        .field-note {
          font-size: 0.95rem;
          line-height: 1.5;
        }

        input,
        button {
          padding-block: 0.82rem;
        }
      }
    </style>
  </head>
  <body class="space-theme-canvas">
    <div class="space-parallax" aria-hidden="true">
      <div class="space-parallax-layer space-glow-layer"></div>
      <div class="space-parallax-layer space-star-layer space-star-layer-deep"></div>
      <div class="space-parallax-layer space-star-layer space-star-layer-far"></div>
      <div class="space-parallax-layer space-star-layer space-star-layer-mid"></div>
      <div class="space-parallax-layer space-star-layer space-star-layer-near"></div>
      <div class="space-parallax-layer space-star-layer space-star-layer-close"></div>
      <div class="space-shooting-stars">
        <div class="space-shooting-star" data-shooting-star></div>
        <div class="space-shooting-star" data-shooting-star></div>
      </div>
    </div>
    <main class="shell">
      <section class="intro" aria-label="Space Agent overview">
        <div id="intro-floating-cluster" class="intro-floating-cluster">
          <div id="intro-title" class="intro-title">
            <h1>Space Agent</h1>
          </div>
          <div class="intro-art" aria-hidden="true">
            <img
              id="intro-astronaut"
              class="intro-astronaut"
              src="/pages/res/astronaut_no_bg.webp"
              alt=""
              decoding="async"
            />
          </div>
        </div>
        <p class="intro-copy">
          Free and open-source AI agent<br />
          that builds your space.<br />
          Right in the browser.
        </p>
      </section>

      <section class="login-panel" aria-label="Login form">
        <form id="login-form">
          <label>
            <span>Username</span>
            <input id="username" name="username" type="text" autocomplete="username" required />
          </label>
          <label>
            <span>Password</span>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </label>
          <p id="field-note" class="field-note" hidden>
            Guest account ready, save your credentials.
            <span class="field-note-secondary">
              Guest accounts are temporary and may be removed any time.
            </span>
          </p>
          <button id="submit-button" class="secondary-button" type="submit">Enter your Space</button>
        </form>
        <div id="login-separator" class="login-separator">or</div>
        <button id="guest-create-button" class="primary-button" type="button">
          Use Guest Account
        </button>
        <div class="login-separator">or</div>
        <a
          class="secondary-link"
          href="https://github.com/agent0ai/agent-zero"
          target="_blank"
          rel="noreferrer"
        >
          Run it yourself for privacy and control
        </a>
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </section>
    </main>
    <script>
      const LOGIN_PREFIX = "space-login-v1";
      const CLIENT_KEY_LABEL = "Client Key";
      const SERVER_KEY_LABEL = "Server Key";
      const INTRO_FLOAT_BASE_PROFILE = Object.freeze({
        blend: Object.freeze({
          positionMs: 1480,
          rotationMs: 5600
        }),
        drift: Object.freeze({
          rotate: Object.freeze({
            primaryAmplitude: 2.4,
            primaryPeriodMs: 8200,
            secondaryAmplitude: 1.1,
            secondaryPeriodMs: 4600
          }),
          x: Object.freeze({
            primaryAmplitude: 4.8,
            primaryPeriodMs: 5200,
            secondaryAmplitude: 2.1,
            secondaryPeriodMs: 2860
          }),
          y: Object.freeze({
            primaryAmplitude: 5.4,
            primaryPeriodMs: 6100,
            secondaryAmplitude: 2,
            secondaryPeriodMs: 3300
          })
        }),
        wander: Object.freeze({
          positionIntervalMaxMs: 5600,
          positionIntervalMinMs: 3000,
          rotationIntervalMaxMs: 5600,
          rotationIntervalMinMs: 3000,
          rotateRange: 5,
          xRange: 10,
          yRange: 8
        })
      });
      // Tune the title directly here; the astronaut derives from the same knobs at 1.5x.
      const TITLE_FLOAT_PARAMS = Object.freeze({
        movementDistance: 1,
        movementSpeed: 1,
        rotationDistance: 1,
        rotationSpeed: 1
      });
      const ASTRONAUT_FLOAT_PARAMS = Object.freeze(scaleFloatParams(TITLE_FLOAT_PARAMS, 1.5));
      const TITLE_FLOAT_PROFILE = buildFloatProfile(INTRO_FLOAT_BASE_PROFILE, TITLE_FLOAT_PARAMS);
      const ASTRONAUT_FLOAT_PROFILE = buildFloatProfile(
        INTRO_FLOAT_BASE_PROFILE,
        ASTRONAUT_FLOAT_PARAMS
      );
      const SHOOTING_STAR_PROFILE = Object.freeze({
        delayMaxMs: 6200,
        delayMinMs: 1800,
        durationMaxMs: 1480,
        durationMinMs: 960,
        initialDelayMaxMs: 2200,
        initialDelayMinMs: 280,
        lengthMaxRem: 12.6,
        lengthMinRem: 8.4,
        travelMaxVmax: 72,
        travelMinVmax: 38,
        directionPools: Object.freeze([
          Object.freeze({ angleMaxDeg: 34, angleMinDeg: 16, leftMax: 48, leftMin: 6, topMax: 44, topMin: 4 }),
          Object.freeze({ angleMaxDeg: 58, angleMinDeg: 38, leftMax: 34, leftMin: 4, topMax: 26, topMin: 2 }),
          Object.freeze({ angleMaxDeg: 166, angleMinDeg: 144, leftMax: 94, leftMin: 52, topMax: 50, topMin: 6 }),
          Object.freeze({ angleMaxDeg: 122, angleMinDeg: 102, leftMax: 96, leftMin: 66, topMax: 28, topMin: 2 }),
          Object.freeze({ angleMaxDeg: -14, angleMinDeg: -34, leftMax: 52, leftMin: 8, topMax: 92, topMin: 42 }),
          Object.freeze({ angleMaxDeg: 214, angleMinDeg: 194, leftMax: 92, leftMin: 50, topMax: 90, topMin: 46 })
        ])
      });
      const textEncoder = new TextEncoder();
      const form = document.getElementById("login-form");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const fieldNote = document.getElementById("field-note");
      const loginSeparator = document.getElementById("login-separator");
      const submitButton = document.getElementById("submit-button");
      const guestCreateButton = document.getElementById("guest-create-button");
      const introTitle = document.getElementById("intro-title");
      const introAstronaut = document.getElementById("intro-astronaut");
      const shootingStarEls = Array.from(document.querySelectorAll("[data-shooting-star]"));
      const statusEl = document.getElementById("status");
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
      const shootingStarTimers = new WeakMap();
      let guestCredentials = null;
      let introFloatFrame = 0;
      let introFloatStartTime = 0;
      let introFloatLastTime = 0;

      function setStatus(message, tone = "") {
        statusEl.textContent = message;
        statusEl.className = tone ? `status ${tone}` : "status";
      }

      function syncButtonState(isBusy = false) {
        submitButton.disabled = isBusy;
        guestCreateButton.disabled = isBusy;
      }

      function setIntroTitlePose(x, y, rotation) {
        if (!introTitle) {
          return;
        }

        introTitle.style.setProperty("--intro-title-float-x", `${x.toFixed(1)}px`);
        introTitle.style.setProperty("--intro-title-float-y", `${y.toFixed(1)}px`);
        introTitle.style.setProperty("--intro-title-rotate", `${rotation.toFixed(1)}deg`);
      }

      function setAstronautPose(x, y, rotation) {
        if (!introAstronaut) {
          return;
        }

        introAstronaut.style.setProperty("--astronaut-float-x", `${x.toFixed(1)}px`);
        introAstronaut.style.setProperty("--astronaut-float-y", `${y.toFixed(1)}px`);
        introAstronaut.style.setProperty("--astronaut-rotate", `${rotation.toFixed(1)}deg`);
      }

      function scaleFloatParams(params, multiplier) {
        return {
          movementDistance: params.movementDistance * multiplier,
          movementSpeed: params.movementSpeed * multiplier,
          rotationDistance: params.rotationDistance * multiplier,
          rotationSpeed: params.rotationSpeed * multiplier
        };
      }

      function scaleDuration(durationMs, speedMultiplier) {
        return durationMs / Math.max(speedMultiplier, 0.01);
      }

      function scaleFloatAxis(axisProfile, distanceMultiplier, speedMultiplier) {
        return Object.freeze({
          primaryAmplitude: axisProfile.primaryAmplitude * distanceMultiplier,
          primaryPeriodMs: scaleDuration(axisProfile.primaryPeriodMs, speedMultiplier),
          secondaryAmplitude: axisProfile.secondaryAmplitude * distanceMultiplier,
          secondaryPeriodMs: scaleDuration(axisProfile.secondaryPeriodMs, speedMultiplier)
        });
      }

      function buildFloatProfile(baseProfile, params) {
        return Object.freeze({
          blend: Object.freeze({
            positionMs: scaleDuration(baseProfile.blend.positionMs, params.movementSpeed),
            rotationMs: scaleDuration(baseProfile.blend.rotationMs, params.rotationSpeed)
          }),
          drift: Object.freeze({
            rotate: scaleFloatAxis(
              baseProfile.drift.rotate,
              params.rotationDistance,
              params.rotationSpeed
            ),
            x: scaleFloatAxis(
              baseProfile.drift.x,
              params.movementDistance,
              params.movementSpeed
            ),
            y: scaleFloatAxis(
              baseProfile.drift.y,
              params.movementDistance,
              params.movementSpeed
            )
          }),
          wander: Object.freeze({
            positionIntervalMaxMs: scaleDuration(
              baseProfile.wander.positionIntervalMaxMs,
              params.movementSpeed
            ),
            positionIntervalMinMs: scaleDuration(
              baseProfile.wander.positionIntervalMinMs,
              params.movementSpeed
            ),
            rotationIntervalMaxMs: scaleDuration(
              baseProfile.wander.rotationIntervalMaxMs,
              params.rotationSpeed
            ),
            rotationIntervalMinMs: scaleDuration(
              baseProfile.wander.rotationIntervalMinMs,
              params.rotationSpeed
            ),
            rotateRange: baseProfile.wander.rotateRange * params.rotationDistance,
            xRange: baseProfile.wander.xRange * params.movementDistance,
            yRange: baseProfile.wander.yRange * params.movementDistance
          })
        });
      }

      class FloatingMotionTarget {
        constructor(element, applyPose, profile, offsets = {}) {
          this.element = element;
          this.applyPose = applyPose;
          this.profile = profile;
          this.offsets = Object.freeze({
            rotate: offsets.rotate || 0,
            x: offsets.x || 0,
            y: offsets.y || 0,
            time: offsets.time || 0
          });
          this.reset();
        }

        reset() {
          this.nextPositionTargetAt = 0;
          this.nextRotationTargetAt = 0;
          this.currentX = 0;
          this.currentY = 0;
          this.currentRotation = 0;
          this.targetX = 0;
          this.targetY = 0;
          this.targetRotation = 0;
          this.applyPose(0, 0, 0);
        }

        choosePositionTarget(timestamp) {
          const { wander } = this.profile;

          this.targetX = randomBetween(-wander.xRange, wander.xRange);
          this.targetY = randomBetween(-wander.yRange, wander.yRange);
          this.nextPositionTargetAt =
            timestamp +
            wander.positionIntervalMinMs +
            Math.random() * (wander.positionIntervalMaxMs - wander.positionIntervalMinMs);
        }

        chooseRotationTarget(timestamp) {
          const { wander } = this.profile;

          this.targetRotation = randomBetween(-wander.rotateRange, wander.rotateRange);
          this.nextRotationTargetAt =
            timestamp +
            wander.rotationIntervalMinMs +
            Math.random() * (wander.rotationIntervalMaxMs - wander.rotationIntervalMinMs);
        }

        step(timestamp, delta, elapsed) {
          if (!this.element) {
            return;
          }

          if (!this.nextPositionTargetAt || timestamp >= this.nextPositionTargetAt) {
            this.choosePositionTarget(timestamp);
          }

          if (!this.nextRotationTargetAt || timestamp >= this.nextRotationTargetAt) {
            this.chooseRotationTarget(timestamp);
          }

          const positionBlend = 1 - Math.exp(-delta / this.profile.blend.positionMs);
          const rotationBlend = 1 - Math.exp(-delta / this.profile.blend.rotationMs);
          const driftX = getFloatDrift(
            elapsed + this.offsets.time,
            this.profile.drift.x,
            this.offsets.x
          );
          const driftY = getFloatDrift(
            elapsed + 420 + this.offsets.time,
            this.profile.drift.y,
            this.offsets.y
          );
          const driftRotation = getFloatDrift(
            elapsed + 930 + this.offsets.time,
            this.profile.drift.rotate,
            this.offsets.rotate
          );

          this.currentX += (this.targetX - this.currentX) * positionBlend;
          this.currentY += (this.targetY - this.currentY) * positionBlend;
          this.currentRotation += (this.targetRotation - this.currentRotation) * rotationBlend;

          this.applyPose(
            this.currentX + driftX,
            this.currentY + driftY,
            this.currentRotation + driftRotation
          );
        }
      }

      function getFloatDrift(elapsed, axisProfile, secondaryOffset = 0) {
        const primaryWave = Math.sin(elapsed / axisProfile.primaryPeriodMs) * axisProfile.primaryAmplitude;
        const secondaryWave =
          Math.cos(elapsed / axisProfile.secondaryPeriodMs + secondaryOffset) * axisProfile.secondaryAmplitude;

        return primaryWave + secondaryWave;
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function chooseRandom(list) {
        return list[Math.floor(Math.random() * list.length)] || null;
      }

      const introFloatTargets = [
        new FloatingMotionTarget(introTitle, setIntroTitlePose, TITLE_FLOAT_PROFILE, {
          rotate: 0.15,
          x: 0.3,
          y: 0.9,
          time: 180
        }),
        new FloatingMotionTarget(introAstronaut, setAstronautPose, ASTRONAUT_FLOAT_PROFILE, {
          rotate: 0.35,
          x: 0.65,
          y: 1.15,
          time: 0
        })
      ];

      function stepIntroFloat(timestamp) {
        if (introFloatTargets.every((target) => !target.element)) {
          introFloatFrame = 0;
          return;
        }

        if (prefersReducedMotion.matches) {
          introFloatFrame = 0;
          introFloatLastTime = 0;
          introFloatStartTime = 0;
          introFloatTargets.forEach((target) => target.reset());
          return;
        }

        if (!introFloatLastTime) {
          introFloatLastTime = timestamp;
        }

        if (!introFloatStartTime) {
          introFloatStartTime = timestamp;
        }

        const delta = Math.min(timestamp - introFloatLastTime, 40);
        const elapsed = timestamp - introFloatStartTime;
        introFloatLastTime = timestamp;

        introFloatTargets.forEach((target) => target.step(timestamp, delta, elapsed));
        introFloatFrame = window.requestAnimationFrame(stepIntroFloat);
      }

      function startIntroFloat() {
        window.cancelAnimationFrame(introFloatFrame);
        introFloatFrame = 0;
        introFloatLastTime = 0;
        introFloatStartTime = 0;
        introFloatTargets.forEach((target) => target.reset());

        if (introFloatTargets.every((target) => !target.element) || prefersReducedMotion.matches) {
          return;
        }

        window.requestAnimationFrame(() => {
          introFloatFrame = window.requestAnimationFrame(stepIntroFloat);
        });
      }

      function clearShootingStarTimer(starEl) {
        const timerId = shootingStarTimers.get(starEl);

        if (!timerId) {
          return;
        }

        window.clearTimeout(timerId);
        shootingStarTimers.delete(starEl);
      }

      function configureShootingStar(starEl) {
        const directionPool = chooseRandom(SHOOTING_STAR_PROFILE.directionPools);

        if (!directionPool) {
          return;
        }

        const angleDeg = randomBetween(directionPool.angleMinDeg, directionPool.angleMaxDeg);
        const travelVmax = randomBetween(
          SHOOTING_STAR_PROFILE.travelMinVmax,
          SHOOTING_STAR_PROFILE.travelMaxVmax
        );
        const angleRad = (angleDeg * Math.PI) / 180;
        const distanceX = Math.cos(angleRad) * travelVmax;
        const distanceY = Math.sin(angleRad) * travelVmax;

        starEl.style.top = `${randomBetween(directionPool.topMin, directionPool.topMax).toFixed(1)}%`;
        starEl.style.left = `${randomBetween(directionPool.leftMin, directionPool.leftMax).toFixed(1)}%`;
        starEl.style.setProperty("--space-shooting-angle", `${angleDeg.toFixed(1)}deg`);
        starEl.style.setProperty("--space-shooting-distance-x", `${distanceX.toFixed(2)}vmax`);
        starEl.style.setProperty("--space-shooting-distance-y", `${distanceY.toFixed(2)}vmax`);
        starEl.style.setProperty(
          "--space-shooting-duration",
          `${Math.round(randomBetween(SHOOTING_STAR_PROFILE.durationMinMs, SHOOTING_STAR_PROFILE.durationMaxMs))}ms`
        );
        starEl.style.setProperty(
          "--space-shooting-length",
          `${randomBetween(SHOOTING_STAR_PROFILE.lengthMinRem, SHOOTING_STAR_PROFILE.lengthMaxRem).toFixed(2)}rem`
        );
      }

      function scheduleShootingStar(
        starEl,
        delayMinMs = SHOOTING_STAR_PROFILE.delayMinMs,
        delayMaxMs = SHOOTING_STAR_PROFILE.delayMaxMs
      ) {
        clearShootingStarTimer(starEl);

        if (!starEl || prefersReducedMotion.matches) {
          return;
        }

        const delayMs = Math.round(randomBetween(delayMinMs, delayMaxMs));
        const timerId = window.setTimeout(() => {
          launchShootingStar(starEl);
        }, delayMs);

        shootingStarTimers.set(starEl, timerId);
      }

      function launchShootingStar(starEl) {
        if (!starEl || prefersReducedMotion.matches) {
          return;
        }

        clearShootingStarTimer(starEl);
        configureShootingStar(starEl);
        starEl.classList.remove("is-active");
        void starEl.offsetWidth;
        starEl.classList.add("is-active");
      }

      function stopShootingStars() {
        shootingStarEls.forEach((starEl) => {
          clearShootingStarTimer(starEl);
          starEl.classList.remove("is-active");
        });
      }

      function startShootingStars() {
        stopShootingStars();

        if (prefersReducedMotion.matches) {
          return;
        }

        shootingStarEls.forEach((starEl, index) => {
          scheduleShootingStar(
            starEl,
            SHOOTING_STAR_PROFILE.initialDelayMinMs + index * 420,
            SHOOTING_STAR_PROFILE.initialDelayMaxMs + index * 980
          );
        });
      }

      function handleMotionPreferenceChange() {
        startIntroFloat();

        if (prefersReducedMotion.matches) {
          stopShootingStars();
          return;
        }

        startShootingStars();
      }

      function setGuestCredentials(credentials) {
        guestCredentials =
          credentials && credentials.username && credentials.password
            ? {
                password: credentials.password,
                username: credentials.username
              }
            : null;

        const isGuestReady = Boolean(guestCredentials);

        if (isGuestReady) {
          usernameInput.value = guestCredentials.username;
          passwordInput.value = guestCredentials.password;
        }

        usernameInput.readOnly = isGuestReady;
        passwordInput.readOnly = isGuestReady;
        passwordInput.type = isGuestReady ? "text" : "password";
        submitButton.textContent = isGuestReady ? "Continue" : "Enter your Space";
        submitButton.classList.toggle("primary-button", isGuestReady);
        submitButton.classList.toggle("secondary-button", !isGuestReady);
        fieldNote.hidden = !isGuestReady;
        loginSeparator.hidden = isGuestReady;
        guestCreateButton.hidden = isGuestReady;
        syncButtonState(false);
      }

      function toBase64Url(bytes) {
        let text = "";
        bytes.forEach((value) => {
          text += String.fromCharCode(value);
        });
        return btoa(text).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
      }

      function fromBase64Url(value) {
        const normalized = String(value || "").replace(/-/g, "+").replace(/_/g, "/");
        const padding = normalized.length % 4 === 0 ? "" : "=".repeat(4 - (normalized.length % 4));
        const decoded = atob(normalized + padding);
        return Uint8Array.from(decoded, (char) => char.charCodeAt(0));
      }

      function xorBytes(left, right) {
        if (left.length !== right.length) {
          throw new Error("Mismatched proof length.");
        }

        const output = new Uint8Array(left.length);

        for (let index = 0; index < left.length; index += 1) {
          output[index] = left[index] ^ right[index];
        }

        return output;
      }

      async function sha256(value) {
        const source = typeof value === "string" ? textEncoder.encode(value) : value;
        return new Uint8Array(await crypto.subtle.digest("SHA-256", source));
      }

      async function hmacSha256(keyBytes, value) {
        const key = await crypto.subtle.importKey(
          "raw",
          keyBytes,
          {
            name: "HMAC",
            hash: "SHA-256"
          },
          false,
          ["sign"]
        );

        return new Uint8Array(await crypto.subtle.sign("HMAC", key, textEncoder.encode(value)));
      }

      async function deriveSaltedPassword(password, salt, iterations) {
        const passwordKey = await crypto.subtle.importKey(
          "raw",
          textEncoder.encode(password),
          "PBKDF2",
          false,
          ["deriveBits"]
        );

        const bits = await crypto.subtle.deriveBits(
          {
            name: "PBKDF2",
            hash: "SHA-256",
            iterations,
            salt: fromBase64Url(salt)
          },
          passwordKey,
          256
        );

        return new Uint8Array(bits);
      }

      async function postJson(path, body) {
        const response = await fetch(path, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });

        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.error || "Request failed.");
        }

        return payload;
      }

      function createNonce() {
        const bytes = new Uint8Array(24);
        crypto.getRandomValues(bytes);
        return toBase64Url(bytes);
      }

      async function handleLogin(event) {
        event.preventDefault();
        setStatus("Signing in...");
        syncButtonState(true);

        try {
          const username = usernameInput.value.trim();
          const password = passwordInput.value;

          if (!username || !password) {
            throw new Error("Username and password are required.");
          }

          const clientNonce = createNonce();
          const challenge = await postJson("/api/login_challenge", {
            clientNonce,
            username
          });
          const saltedPassword = await deriveSaltedPassword(
            password,
            challenge.salt,
            Number(challenge.iterations)
          );
          const clientKey = await hmacSha256(saltedPassword, CLIENT_KEY_LABEL);
          const storedKey = await sha256(clientKey);
          const authMessage = [
            LOGIN_PREFIX,
            username,
            clientNonce,
            challenge.serverNonce,
            challenge.challengeToken
          ].join(":");
          const clientSignature = await hmacSha256(storedKey, authMessage);
          const clientProof = xorBytes(clientKey, clientSignature);
          const loginResult = await postJson("/api/login", {
            challengeToken: challenge.challengeToken,
            clientProof: toBase64Url(clientProof)
          });
          const serverKey = await hmacSha256(saltedPassword, SERVER_KEY_LABEL);
          const expectedServerSignature = await hmacSha256(serverKey, authMessage);

          if (toBase64Url(expectedServerSignature) !== loginResult.serverSignature) {
            throw new Error("Server signature check failed.");
          }

          setStatus("Signed in. Redirecting...", "ok");
          window.location.replace("/");
        } catch (error) {
          setStatus(error.message || "Sign-in failed.", "error");
          syncButtonState(false);
          passwordInput.select();
        }
      }

      async function handleGuestCreate() {
        setStatus("Creating guest account...");
        syncButtonState(true);

        try {
          const guestAccount = await postJson("/api/guest_create", {});
          setGuestCredentials(guestAccount);
          setStatus("");
        } catch (error) {
          syncButtonState(false);
          setStatus(error.message || "Guest account creation failed.", "error");
        }
      }

      form.addEventListener("submit", handleLogin);
      guestCreateButton.addEventListener("click", handleGuestCreate);
      shootingStarEls.forEach((starEl) => {
        starEl.addEventListener("animationend", () => {
          starEl.classList.remove("is-active");
          scheduleShootingStar(starEl);
        });
      });
      usernameInput.addEventListener("focus", () => {
        if (usernameInput.readOnly) {
          usernameInput.select();
        }
      });
      passwordInput.addEventListener("focus", () => {
        if (passwordInput.readOnly) {
          passwordInput.select();
        }
      });
      if (typeof prefersReducedMotion.addEventListener === "function") {
        prefersReducedMotion.addEventListener("change", handleMotionPreferenceChange);
      } else if (typeof prefersReducedMotion.addListener === "function") {
        prefersReducedMotion.addListener(handleMotionPreferenceChange);
      }
      syncButtonState(false);
      startShootingStars();
      if (introAstronaut && !introAstronaut.complete) {
        introAstronaut.addEventListener("load", startIntroFloat, { once: true });
      } else {
        startIntroFloat();
      }
    </script>
  </body>
</html>
